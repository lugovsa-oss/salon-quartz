<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="Georgia, serif">

  <!-- Background -->

  <rect width="680" height="400" fill="#f7f4ef"/>

  <!-- Title -->

<text x="340" y="32" text-anchor="middle" font-size="15" fill="#2a2a2a" font-style="italic">glide plane</text>
<text x="340" y="52" text-anchor="middle" font-size="11" fill="#777">reflection + translation in the plane</text>

  <!-- Glide plane line -->

  <line x1="60" y1="210" x2="590" y2="210" stroke="#b07030" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="598" y="214" font-size="11" fill="#b07030" font-style="italic">plane</text>

  <!-- ORIGINAL MOTIF (above, left) -->

  <g transform="translate(160, 140)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#3a6ea5" fill-opacity="0.18" stroke="#3a6ea5" stroke-width="1.5"/>
    <circle cx="10" cy="-12" r="5" fill="#3a6ea5" fill-opacity="0.7"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#3a6ea5" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="160" y="103" text-anchor="middle" font-size="11" fill="#3a6ea5">1</text>

  <!-- GHOST: reflected motif (below, left) -->

  <g transform="translate(160, 280) scale(1,-1)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#3a6ea5" fill-opacity="0.07" stroke="#3a6ea5" stroke-width="1.2" stroke-dasharray="4,3"/>
    <circle cx="10" cy="-12" r="5" fill="#3a6ea5" fill-opacity="0.25"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#3a6ea5" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="3,3"/>
  </g>
  <text x="160" y="338" text-anchor="middle" font-size="10" fill="#888">(reflection)</text>

  <!-- Reflection arrow (vertical, dashed) -->

  <line x1="196" y1="150" x2="196" y2="268" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="196,274 192,262 200,262" fill="#aaa"/>
  <text x="204" y="215" font-size="11" fill="#aaa" font-style="italic">&#963;</text>

  <!-- Translation arrow -->

  <line x1="185" y1="285" x2="405" y2="285" stroke="#c0392b" stroke-width="1.8"/>
  <polygon points="411,285 399,280 399,290" fill="#c0392b"/>
  <text x="295" y="304" text-anchor="middle" font-size="11" fill="#c0392b" font-style="italic">translation t = a/2</text>

  <!-- FINAL MOTIF (below, right) -->

  <g transform="translate(430, 280) scale(1,-1)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#27ae60" fill-opacity="0.18" stroke="#27ae60" stroke-width="1.8"/>
    <circle cx="10" cy="-12" r="5" fill="#27ae60" fill-opacity="0.8"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#27ae60" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="430" y="338" text-anchor="middle" font-size="11" fill="#27ae60">2</text>

  <!-- Combined operation arc -->

  <path d="M 185 138 Q 295 72 405 138" stroke="#555" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="408,140 396,132 401,143" fill="#555"/>
  <text x="295" y="68" text-anchor="middle" font-size="12" fill="#333" font-style="italic">g = &#963; &#183; t</text>

  <!-- Legend -->

  <rect x="468" y="108" width="175" height="88" rx="4" fill="white" fill-opacity="0.75" stroke="#ccc" stroke-width="1"/>
  <text x="555" y="126" text-anchor="middle" font-size="10.5" fill="#333" font-weight="bold">legend</text>
  <circle cx="486" cy="141" r="5" fill="#3a6ea5" fill-opacity="0.5"/>
  <text x="496" y="145" font-size="10" fill="#333">original motif</text>
  <circle cx="486" cy="158" r="5" fill="#27ae60" fill-opacity="0.7"/>
  <text x="496" y="162" font-size="10" fill="#333">after glide reflection</text>
  <line x1="480" y1="175" x2="496" y2="175" stroke="#c0392b" stroke-width="1.8"/>
  <polygon points="498,175 492,172 492,178" fill="#c0392b"/>
  <text x="503" y="178" font-size="10" fill="#333">translation t</text>

</svg>