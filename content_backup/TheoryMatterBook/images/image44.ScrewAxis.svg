<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460" font-family="Georgia, serif">

  <!-- Background -->

  <rect width="680" height="460" fill="#f7f4ef"/>

  <!-- Title -->

<text x="340" y="32" text-anchor="middle" font-size="15" fill="#2a2a2a" font-style="italic">screw axis 2₁</text>
<text x="340" y="52" text-anchor="middle" font-size="11" fill="#777">rotation 180° + translation t = c/2 along axis</text>

  <!-- === VERTICAL SCREW AXIS === -->

  <line x1="340" y1="75" x2="340" y2="400" stroke="#b07030" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="348" y="410" font-size="11" fill="#b07030" font-style="italic">axis</text>

  <!-- Tick marks at c/2 intervals -->

  <line x1="333" y1="130" x2="347" y2="130" stroke="#b07030" stroke-width="1"/>
  <line x1="333" y1="270" x2="347" y2="270" stroke="#b07030" stroke-width="1"/>
  <text x="318" y="134" text-anchor="end" font-size="9" fill="#b07030">0</text>
  <text x="318" y="274" text-anchor="end" font-size="9" fill="#b07030">c/2</text>

  <!-- c/2 brace -->

  <line x1="308" y1="132" x2="308" y2="268" stroke="#b07030" stroke-width="1"/>
  <line x1="303" y1="132" x2="313" y2="132" stroke="#b07030" stroke-width="1"/>
  <line x1="303" y1="268" x2="313" y2="268" stroke="#b07030" stroke-width="1"/>
  <text x="296" y="205" text-anchor="middle" font-size="10" fill="#b07030" font-style="italic" transform="rotate(-90,296,205)">t = c/2</text>

  <!-- === ORIGINAL MOTIF (right of axis, at z=0) === -->

  <g transform="translate(430, 130)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#3a6ea5" fill-opacity="0.18" stroke="#3a6ea5" stroke-width="1.5"/>
    <circle cx="10" cy="-12" r="5" fill="#3a6ea5" fill-opacity="0.7"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#3a6ea5" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="430" y="95" text-anchor="middle" font-size="11" fill="#3a6ea5">1</text>
  <!-- dashed line to axis -->
  <line x1="340" y1="130" x2="410" y2="130" stroke="#3a6ea5" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- === ROTATION ARC (180°) around axis === -->

  <!-- Arc going from right side, curving over to left side -->

  <path d="M 415 118 Q 340 78 265 118" stroke="#9b59b6" stroke-width="1.5" fill="none"/>
  <polygon points="262,120 268,109 274,119" fill="#9b59b6"/>
  <text x="340" y="74" text-anchor="middle" font-size="11" fill="#9b59b6" font-style="italic">180°</text>

  <!-- === INTERMEDIATE (ghost): rotated, still at z=0, left of axis === -->

  <!-- Rotated 180° around vertical axis: motif flips left, and is mirror-like (x → -x) -->

  <g transform="translate(250, 130) scale(-1,1)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#9b59b6" fill-opacity="0.07" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="4,3"/>
    <circle cx="10" cy="-12" r="5" fill="#9b59b6" fill-opacity="0.25"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#9b59b6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="3,3"/>
  </g>
  <text x="250" y="95" text-anchor="middle" font-size="10" fill="#888">(rotated)</text>
  <line x1="340" y1="130" x2="270" y2="130" stroke="#9b59b6" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- === TRANSLATION ARROW (down c/2) === -->

  <line x1="238" y1="148" x2="238" y2="250" stroke="#c0392b" stroke-width="1.8"/>
  <polygon points="238,256 234,244 242,244" fill="#c0392b"/>
  <text x="220" y="205" text-anchor="middle" font-size="11" fill="#c0392b" font-style="italic" transform="rotate(-90,220,205)">t = c/2</text>

  <!-- === FINAL MOTIF (left of axis, at z=c/2) === -->

  <g transform="translate(250, 270) scale(-1,1)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#27ae60" fill-opacity="0.18" stroke="#27ae60" stroke-width="1.8"/>
    <circle cx="10" cy="-12" r="5" fill="#27ae60" fill-opacity="0.8"/>
    <path d="M -8 18 Q -18 28 -14 36" stroke="#27ae60" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="250" y="235" text-anchor="middle" font-size="11" fill="#27ae60">2</text>
  <line x1="340" y1="270" x2="270" y2="270" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Combined operation curved arrow: from motif 1 to motif 2 -->

  <path d="M 448 145 Q 530 200 448 258" stroke="#555" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="446,261 452,249 458,258" fill="#555"/>
  <text x="548" y="205" text-anchor="middle" font-size="12" fill="#333" font-style="italic">g = R&#8322; &#183; t</text>

  <!-- Legend -->

  <rect x="430" y="300" width="200" height="100" rx="4" fill="white" fill-opacity="0.75" stroke="#ccc" stroke-width="1"/>
  <text x="530" y="318" text-anchor="middle" font-size="10.5" fill="#333" font-weight="bold">legend</text>
  <circle cx="448" cy="333" r="5" fill="#3a6ea5" fill-opacity="0.5"/>
  <text x="458" y="337" font-size="10" fill="#333">original motif (z = 0)</text>
  <circle cx="448" cy="350" r="5" fill="#27ae60" fill-opacity="0.7"/>
  <text x="458" y="354" font-size="10" fill="#333">after screw operation (z = c/2)</text>
  <line x1="442" y1="367" x2="458" y2="367" stroke="#c0392b" stroke-width="1.8"/>
  <polygon points="460,367 454,364 454,370" fill="#c0392b"/>
  <text x="463" y="370" font-size="10" fill="#333">translation t = c/2</text>
  <path d="M 442 381 Q 450 376 458 381" stroke="#9b59b6" stroke-width="1.5" fill="none"/>
  <text x="463" y="385" font-size="10" fill="#333">rotation 180°</text>

</svg>